name: publish

on:
    push:
        tags: ["v*"]
    workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SERVICES_URL: https://api.yoosk.xyz

jobs:
    publish-tauri:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: --target aarch64-apple-darwin
                    - platform: macos-latest
                      args: --target x86_64-apple-darwin
                    - platform: ubuntu-22.04
                      args: ""
                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - name: Install required packages
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt update
                  sudo apt install -y libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libbpf-dev libelf-dev zlib1g-dev llvm clang

            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: nightly
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build Anticheat (Linux)
              if: runner.os == 'Linux'
              run: |
                  git clone https://${{ secrets.CHECKOUT_TOKEN }}@github.com/YooskDev/yoosk-anticheat.git ../yoosk-anticheat
                  cd ../yoosk-anticheat
                  cargo build --release --no-default-features
                  mkdir -p "$GITHUB_WORKSPACE/src-tauri/resources"
                  cp target/release/yoosk-anticheat "$GITHUB_WORKSPACE/src-tauri/resources/yoosk-anticheat"

            - name: Build Anticheat (macOS)
              if: runner.os == 'macOS'
              run: |
                  git clone https://${{ secrets.CHECKOUT_TOKEN }}@github.com/YooskDev/yoosk-anticheat.git ../yoosk-anticheat
                  cd ../yoosk-anticheat
                  TARGET_ARG=""
                  if [[ "${{ matrix.args }}" == *"--target"* ]]; then
                      TARGET_VAL=$(echo "${{ matrix.args }}" | grep -oE "target [a-zA-Z0-9_-]+" | cut -d' ' -f2)
                      if [ -n "$TARGET_VAL" ]; then
                          TARGET_ARG="--target $TARGET_VAL"
                      fi
                  fi
                  cargo build --release --no-default-features $TARGET_ARG
                  mkdir -p "$GITHUB_WORKSPACE/src-tauri/resources"
                  if [ -n "$TARGET_VAL" ]; then
                      cp "target/$TARGET_VAL/release/yoosk-anticheat" "$GITHUB_WORKSPACE/src-tauri/resources/yoosk-anticheat"
                  else
                      cp target/release/yoosk-anticheat "$GITHUB_WORKSPACE/src-tauri/resources/yoosk-anticheat"
                  fi

            - name: Build Anticheat (Windows)
              if: runner.os == 'Windows'
              run: |
                  git clone https://${{ secrets.CHECKOUT_TOKEN }}@github.com/YooskDev/yoosk-anticheat.git ../yoosk-anticheat
                  cd ../yoosk-anticheat
                  cargo build --release
                  python -c "import os, shutil; dest = os.path.join(os.environ['GITHUB_WORKSPACE'], 'src-tauri', 'resources'); os.makedirs(dest, exist_ok=True); shutil.copy2('target/release/yoosk-anticheat.exe', os.path.join(dest, 'yoosk-anticheat.exe'))"
              shell: cmd

            - uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.CHECKOUT_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  token: ${{ secrets.CHECKOUT_TOKEN }}
                  tagName: v__VERSION__
                  releaseName: "Yoosk Launcher v__VERSION__"
                  releaseBody: "Yoosk Launcher Release v__VERSION__"
                  args: ${{ matrix.args }}
                  releaseCommitish: main
                  owner: YooskDev
                  repo: valoria-launcher-public
